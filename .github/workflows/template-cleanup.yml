name: template-cleanup

# Runs once on the first push of a fork made from this template.
# Substitutes the upstream-hardcoded strings, self-deletes, then
# kicks off build.yml manually so the published `:latest` image is
# built from the substituted Dockerfile (correct OCI source label).

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    # Skip on the upstream template itself — only fire in forked copies.
    # `is_template` reflects this repo's flag; forks created from a
    # template have it set to false.
    if: ${{ !github.event.repository.is_template && github.repository != 'EightOEight/fp-site-template' }}
    runs-on: ubuntu-latest
    env:
      OWNER_REPO: ${{ github.repository }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Substitute placeholders
        run: |
          set -euo pipefail
          OWNER_LOWER="$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')"

          # composer.json — name (lowercase per composer schema), description,
          # homepage, support.issues, support.source.
          sed -i \
            -e "s|\"name\": \"eightoeight/fp-site-template\"|\"name\": \"${OWNER_LOWER}/${REPO_LOWER}\"|" \
            -e "s|FrankenPress site template — Bedrock-layout WordPress site preconfigured for the FrankenPress stack (Caddy + FrankenPHP + Souin + S3).|WordPress site running on the FrankenPress stack.|" \
            -e "s|https://github.com/EightOEight/fp-site-template/issues|https://github.com/${OWNER}/${REPO}/issues|g" \
            -e "s|https://github.com/EightOEight/fp-site-template|https://github.com/${OWNER}/${REPO}|g" \
            composer.json

          # Dockerfile — OCI image.source label.
          sed -i \
            -e "s|org.opencontainers.image.source=\"https://github.com/EightOEight/fp-site-template\"|org.opencontainers.image.source=\"https://github.com/${OWNER}/${REPO}\"|" \
            Dockerfile

      - name: Commit substitutions + workflow self-delete
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/template-cleanup.yml
          git add composer.json Dockerfile
          if git diff --cached --quiet; then
            echo "nothing to commit — substitutions already applied?"
            exit 0
          fi
          git commit -m "chore: initialize from fp-site-template

          Auto-customised by template-cleanup.yml on first push:
          - composer.json: name, description, homepage, support URLs
          - Dockerfile: org.opencontainers.image.source label
          - Removed .github/workflows/template-cleanup.yml (one-shot)"
          git push origin HEAD:main

      - name: Trigger build.yml on the substituted commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pushes made by GITHUB_TOKEN don't trigger downstream workflow
          # runs. Manually dispatch build.yml so the first published image
          # is the correctly-substituted one.
          gh workflow run build.yml --ref main

      - name: Job summary
        if: always()
        run: |
          {
            echo "### Template cleanup complete"
            echo ""
            echo "- **Repo:** \`${OWNER_REPO}\`"
            echo "- **Build dispatched:** see Actions → build for the first \`:latest\` image"
            echo ""
            echo "Next: clone the repo locally and follow https://docs.frankenpress.com/your-first-site"
          } >>"$GITHUB_STEP_SUMMARY"
